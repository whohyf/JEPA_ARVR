# Reference template; run_hdepic_lora_probe.slurm regenerates this at job start.
nodes: 1
tasks_per_node: 2
cpus_per_task: 24
tag: hdepic-ar10s-ddp2-bs16-w4-smoke-i150
eval_name: app.hdepic_lora_action_anticipation
folder: /scratch/yh6416/VJEPA2-EXP/outputs/hdepic_lora_action_anticipation
resume_checkpoint: false
experiment:
  classifier:
    num_probe_blocks: 4
    num_heads: 16
  data:
    anticipation_time_sec:
    - 10.0
    - 10.0
    auto_augment: true
    file_format: 1
    dataset: EK100
    base_path: /scratch/yh6416/VJEPA2-EXP/data/hdepic_vjepa_videos
    dataset_train: /scratch/yh6416/VJEPA2-EXP/data/hdepic_vjepa_annotations/HD_EPIC_train_vjepa.csv
    dataset_val: /scratch/yh6416/VJEPA2-EXP/data/hdepic_vjepa_annotations/HD_EPIC_val_vjepa.csv
    frames_per_clip: 32
    frames_per_second: 8
    motion_shift: false
    num_workers: 4
    pin_memory: true
    random_resize_scale:
    - 0.08
    - 1.0
    reprob: 0.25
    resolution: 384
    train_anticipation_point:
    - 0.0
    - 0.0
    train_anticipation_time_sec:
    - 10.0
    - 10.0
    val_num_workers: 4
    clip_balanced: true
  optimization:
    num_epochs: 1
    batch_size: 8
    use_bfloat16: false
    use_focal_loss: false
    multihead_kwargs:
    - weight_decay: 0.0001
      final_weight_decay: 0.0001
      lr: 0.0004
      start_lr: 0.0
      final_lr: 0.0
      warmup: 2.0
    val_every_epochs: 1
  lora:
    enabled: true
    rank: 8
    alpha: 16.0
    dropout: 0.05
    probe_train_mode: full
    train_heads: true
    pretrained_probe: ''
    align_reference_metrics: true
    val_metric_scope: native
    encoder_lora:
      enabled: true
      rank: 8
      alpha: 16.0
      dropout: 0.05
      last_n_blocks: 0
      lr_mult: 0.5
      weight_decay: 0.0001
      activation_checkpointing: true
      target_suffixes:
      - attn.qkv
      - attn.proj
    gaze:
      mode: binary_input_adapter_gaze_pose_matrix
    prediction_dump:
      enabled: false
model_kwargs:
  checkpoint: /scratch/yh6416/VJEPA2-EXP/checkpoints/vitg-384.pt
  module_name: app.hdepic_lora_action_anticipation.modelcustom.vit_encoder_predictor_rollout
  wrapper_kwargs:
    no_predictor: false
    num_output_frames: 2
    num_steps: 1
    return_mode: final_window
    max_rollout_steps: 512
  pretrain_kwargs:
    encoder:
      model_name: vit_giant_xformers
      checkpoint_key: target_encoder
      tubelet_size: 2
      patch_size: 16
      uniform_power: true
      use_rope: true
    predictor:
      model_name: vit_predictor
      checkpoint_key: predictor
      num_frames: 64
      depth: 12
      num_heads: 12
      predictor_embed_dim: 384
      num_mask_tokens: 10
      uniform_power: true
      use_mask_tokens: true
      use_sdpa: true
      use_silu: false
      wide_silu: false
      use_rope: true
val_only: false
